<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Slider</title>

<!-- Swiper CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
}

.container {
  max-width: 1100px;
  margin: 50px auto;
  padding: 0 20px;
}

/* Slider */
.video-slide-container {
  position: relative;
  cursor: pointer;
  width: 100%;
  aspect-ratio: 16 / 9; /* Mantiene proporción del video */
  overflow: hidden;
  border-radius: 12px;
}

.video-preview-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 12px;
}

/* Botón play */
.play-button-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  color: white;
  opacity: 0.9;
  pointer-events: none;
}

/* Flechas */
.swiper-button-prev,
.swiper-button-next {
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <h2>Video Slider</h2>

  <div class="swiper swiper-video">
    <div class="swiper-wrapper">

      <!-- VIDEO 1 -->
      <div class="swiper-slide video-slide-container"
        data-iframe='<iframe width="100%" height="100%" 
        src="https://www.youtube.com/embed/PwaYXrZ1UGc?enablejsapi=1" 
        frameborder="0" allow="fullscreen; autoplay; encrypted-media" allowfullscreen></iframe>'>
        <img src="https://img.youtube.com/vi/PwaYXrZ1UGc/hqdefault.jpg"
             class="video-preview-image">
        <div class="play-button-overlay">▶</div>
      </div>

      <!-- VIDEO 2 -->
      <div class="swiper-slide video-slide-container"
        data-iframe='<iframe width="100%" height="100%" 
        src="https://www.youtube.com/embed/z0rwAWz7K0o?enablejsapi=1" 
        frameborder="0" allow="fullscreen; autoplay; encrypted-media" allowfullscreen></iframe>'>
        <img src="https://img.youtube.com/vi/z0rwAWz7K0o/hqdefault.jpg"
             class="video-preview-image">
        <div class="play-button-overlay">▶</div>
      </div>

      <!-- VIDEO 3 -->
      <div class="swiper-slide video-slide-container"
        data-iframe='<iframe width="100%" height="100%" 
        src="https://www.youtube.com/embed/KNYy8vah6vI?enablejsapi=1" 
        frameborder="0" allow="fullscreen; autoplay; encrypted-media" allowfullscreen></iframe>'>
        <img src="https://img.youtube.com/vi/KNYy8vah6vI/hqdefault.jpg"
             class="video-preview-image">
        <div class="play-button-overlay">▶</div>
      </div>

    </div>

    <!-- Flechas -->
    <div class="swiper-button-prev swiper-button-prev-video"></div>
    <div class="swiper-button-next swiper-button-next-video"></div>
  </div>
</div>

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
// Inicializar slider
const videoSwiper = new Swiper('.swiper-video', {
    loop: false,
    slidesPerView: 1,
    spaceBetween: 10,
    breakpoints: {
        768: { slidesPerView: 2 },
        992: { slidesPerView: 2 }
    },
    navigation: {
        nextEl: '.swiper-button-next-video',
        prevEl: '.swiper-button-prev-video',
    },
    on: {
        slideChange: function () {
            document.querySelectorAll('iframe').forEach(iframe => {
                iframe.contentWindow.postMessage(
                  '{"event":"command","func":"stopVideo","args":""}', '*'
                );
            });
        }
    }
});

// Click para cargar video
document.querySelectorAll('.video-slide-container').forEach(slide => {
    slide.addEventListener('click', function () {
        if (!this.querySelector('iframe')) {
            this.innerHTML = this.dataset.iframe;
        }
    });
});
</script>

</body>
</html>
