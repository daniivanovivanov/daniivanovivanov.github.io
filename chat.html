<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 Friends Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --text: #e8e8f0;
    --text-muted: #6a6a8a;
    --msg-other: #161620;
    --online: #4ade80;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(124,92,252,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 100%, rgba(252,92,125,0.08) 0%, transparent 50%);
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: rgba(17,17,24,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
    gap: 8px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo span { color: var(--text-muted); font-weight: 400; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  /* ── LANGUAGE SWITCHER ── */
  #lang-switcher {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 22px;
    overflow: hidden;
    padding: 3px;
    gap: 2px;
    flex-shrink: 0;
  }

  .lang-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    padding: 4px 9px;
    cursor: pointer;
    transition: all .18s;
    border-radius: 18px;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }

  .lang-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }

  .lang-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }

  .lang-flag { font-size: 13px; line-height: 1; }

  /* ── ONLINE + USER ── */
  #online-count {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  #user-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 11px;
    font-size: 0.78rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .2s;
    max-width: 110px;
  }

  #user-badge:hover { border-color: var(--accent); color: var(--text); }

  #user-badge .dot {
    width: 7px; height: 7px;
    background: var(--online);
    border-radius: 50%;
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }

  #username-display { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }

  /* ── MESSAGES ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
    animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg-group.own   { align-items: flex-end; }
  .msg-group.other { align-items: flex-start; }

  .msg-author {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    padding: 0 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .msg-author-name { color: var(--accent); font-weight: 700; }
  .msg-group.own .msg-author-name { color: var(--accent2); }

  .bubble {
    max-width: min(75%, 420px);
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 0.92rem;
    line-height: 1.5;
    word-break: break-word;
  }

  .msg-group.own .bubble {
    background: linear-gradient(135deg, rgba(124,92,252,0.25), rgba(124,92,252,0.12));
    border: 1px solid rgba(124,92,252,0.3);
    border-bottom-right-radius: 6px;
  }

  .msg-group.other .bubble {
    background: var(--msg-other);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
  }

  /* ── DATE SEPARATOR ── */
  .date-sep {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
  }

  .date-sep::before, .date-sep::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .date-sep span {
    font-size: 0.68rem;
    font-family: 'Space Mono', monospace;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ── INPUT ── */
  #input-area {
    padding: 10px 14px 14px;
    background: rgba(17,17,24,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #input-wrap {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 7px 7px 7px 14px;
    transition: border-color .2s;
  }

  #input-wrap:focus-within { border-color: var(--accent); }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.92rem;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    padding: 4px 0;
  }

  #msg-input::placeholder { color: var(--text-muted); }

  #emoji-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 5px;
    border-radius: 8px;
    flex-shrink: 0;
    transition: color .2s;
  }
  #emoji-btn:hover { color: var(--text); }

  #send-btn {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
    transition: transform .15s, opacity .15s;
  }
  #send-btn:hover  { transform: scale(1.08); }
  #send-btn:active { transform: scale(0.94); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── TYPING ── */
  #typing-area {
    height: 17px;
    padding: 0 18px;
    font-size: 0.7rem;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    flex-shrink: 0;
  }

  /* ── MODAL ── */
  #name-modal {
    position: fixed; inset: 0;
    background: rgba(10,10,15,0.96);
    backdrop-filter: blur(20px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }

  #name-modal.hidden { display: none; }

  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 38px 34px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.88) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-icon  { font-size: 46px; margin-bottom: 14px; }

  .modal-title {
    font-family: 'Space Mono', monospace;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .modal-sub {
    color: var(--text-muted);
    font-size: 0.84rem;
    margin-bottom: 26px;
    line-height: 1.5;
  }

  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    padding: 12px 16px;
    outline: none;
    margin-bottom: 14px;
    transition: border-color .2s;
  }

  .modal-input:focus { border-color: var(--accent); }

  .modal-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
  }
  .modal-btn:hover  { opacity: 0.9; transform: translateY(-1px); }
  .modal-btn:active { transform: translateY(1px); }

  /* ── EMPTY STATE ── */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    text-align: center;
    padding: 40px;
  }

  #empty-state .big { font-size: 46px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 500px) {
    .lang-btn .lang-label { display: none; }
    .lang-btn { padding: 5px 7px; }
    #online-count { display: none; }
    .bubble { max-width: 88%; }
    .modal-card { padding: 28px 20px; }
  }
</style>
</head>
<body>

<!-- ── NAME MODAL ── -->
<div id="name-modal">
  <div class="modal-card">
    <div class="modal-icon">👾</div>
    <div class="modal-title" id="modal-title">Welcome!</div>
    <p class="modal-sub" id="modal-sub">What do your friends call you?<br>This name will appear in the chat.</p>
    <input id="name-input" class="modal-input" type="text" placeholder="Your name..." maxlength="24" autocomplete="off">
    <button class="modal-btn" id="modal-btn" onclick="setName()">Enter chat →</button>
  </div>
</div>

<!-- ── HEADER ── -->
<header>
  <div class="logo">
    <div class="logo-icon">💬</div>
    Chat<span id="logo-suffix">.friends</span>
  </div>

  <!-- Language Switcher -->
  <div id="lang-switcher">
    <button class="lang-btn active" data-lang="en" onclick="setLang('en')">
      <span class="lang-flag">🇬🇧</span><span class="lang-label">EN</span>
    </button>
    <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">
      <span class="lang-flag">🇷🇺</span><span class="lang-label">RU</span>
    </button>
    <button class="lang-btn" data-lang="es" onclick="setLang('es')">
      <span class="lang-flag">🇪🇸</span><span class="lang-label">ES</span>
    </button>
  </div>

  <div class="header-right">
    <div id="online-count">
      <span style="color:var(--online)">●</span>
      <span id="online-num">0</span>&nbsp;<span id="lbl-online">online</span>
    </div>
    <div id="user-badge" onclick="changeName()">
      <div class="dot"></div>
      <span id="username-display">—</span>
    </div>
  </div>
</header>

<!-- ── MESSAGES ── -->
<div id="messages">
  <div id="empty-state">
    <div class="big">🫧</div>
    <div id="empty-line1">No messages yet.</div>
    <div id="empty-line2">Be the first!</div>
  </div>
</div>

<!-- ── TYPING ── -->
<div id="typing-area"></div>

<!-- ── INPUT ── -->
<div id="input-area">
  <div id="input-wrap">
    <button id="emoji-btn" onclick="toggleEmoji()">😄</button>
    <textarea id="msg-input" rows="1"
      placeholder="Write something..."
      onkeydown="handleKey(event)"
      oninput="autoResize(this); handleTyping()"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script type="module">
// ══════════════════════════════════════════════
//  FIREBASE CONFIG
// ══════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCyjRM-ONcCeONf71Nwzx8MGImIN2l4piU",
  authDomain:        "chatgithubtest-612e1.firebaseapp.com",
  databaseURL:       "https://chatgithubtest-612e1-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "chatgithubtest-612e1",
  storageBucket:     "chatgithubtest-612e1.firebasestorage.app",
  messagingSenderId: "3927146279",
  appId:             "1:3927146279:web:b8be238f5d928dbca83302",
  measurementId:     "G-6H5PVFF1JZ"
};

import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded,
         onValue, set, onDisconnect,
         query, limitToLast } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ══════════════════════════════════════════════
//  TRANSLATIONS
// ══════════════════════════════════════════════
const T = {
  en: {
    logoSuffix:   ".friends",
    modalTitle:   "Welcome!",
    modalSub:     "What do your friends call you?<br>This name will appear in the chat.",
    modalPlaceholder: "Your name...",
    modalBtn:     "Enter chat →",
    emptyLine1:   "No messages yet.",
    emptyLine2:   "Be the first!",
    online:       "online",
    placeholder:  "Write something...",
    typing1:      n     => `${n} is typing...`,
    typingMany:   (s,l) => `${s} and ${l} are typing...`,
    locale:       "en-US",
  },
  ru: {
    logoSuffix:   ".друзья",
    modalTitle:   "Добро пожаловать!",
    modalSub:     "Как тебя зовут друзья?<br>Это имя будет видно в чате.",
    modalPlaceholder: "Твоё имя...",
    modalBtn:     "Войти в чат →",
    emptyLine1:   "Сообщений пока нет.",
    emptyLine2:   "Будь первым!",
    online:       "онлайн",
    placeholder:  "Напиши что-нибудь...",
    typing1:      n     => `${n} печатает...`,
    typingMany:   (s,l) => `${s} и ${l} печатают...`,
    locale:       "ru-RU",
  },
  es: {
    logoSuffix:   ".amigos",
    modalTitle:   "¡Bienvenid@!",
    modalSub:     "¿Cómo te llaman tus amigos?<br>Este nombre aparecerá en el chat.",
    modalPlaceholder: "Tu nombre...",
    modalBtn:     "Entrar al chat →",
    emptyLine1:   "Nadie ha dicho nada aún.",
    emptyLine2:   "¡Sé el primero!",
    online:       "online",
    placeholder:  "Escribe algo...",
    typing1:      n     => `${n} está escribiendo...`,
    typingMany:   (s,l) => `${s} y ${l} están escribiendo...`,
    locale:       "es-ES",
  }
};

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentLang = localStorage.getItem('chat_lang') || 'en';
let currentUser = localStorage.getItem('chat_name') || '';
let userId      = localStorage.getItem('chat_uid')  || crypto.randomUUID();
localStorage.setItem('chat_uid', userId);

let db, messagesRef, presenceRef, typingRef;
let typingTimer;
let lastDate    = '';
let messageKeys = new Set();
let isAtBottom  = true;
let firebaseInited = false;

// ══════════════════════════════════════════════
//  EXPOSE GLOBALS
// ══════════════════════════════════════════════
window.setLang     = setLang;
window.setName     = setName;
window.changeName  = changeName;
window.sendMessage = sendMessage;
window.handleKey   = handleKey;
window.autoResize  = autoResize;
window.handleTyping= handleTyping;
window.toggleEmoji = toggleEmoji;

// ══════════════════════════════════════════════
//  LANGUAGE SWITCHER
// ══════════════════════════════════════════════
function applyLang(lang) {
  currentLang = lang;
  localStorage.setItem('chat_lang', lang);
  const t = T[lang];

  document.documentElement.lang = lang;
  document.getElementById('logo-suffix').textContent      = t.logoSuffix;
  document.getElementById('lbl-online').textContent       = t.online;
  document.getElementById('modal-title').textContent      = t.modalTitle;
  document.getElementById('modal-sub').innerHTML          = t.modalSub;
  document.getElementById('name-input').placeholder       = t.modalPlaceholder;
  document.getElementById('modal-btn').textContent        = t.modalBtn;
  document.getElementById('empty-line1').textContent      = t.emptyLine1;
  document.getElementById('empty-line2').textContent      = t.emptyLine2;
  document.getElementById('msg-input').placeholder        = t.placeholder;

  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang)
  );
}

function setLang(lang) {
  applyLang(lang);
}

// ══════════════════════════════════════════════
//  FIREBASE
// ══════════════════════════════════════════════
function initFirebase() {
  if (firebaseInited) return;
  firebaseInited = true;

  const app = initializeApp(FIREBASE_CONFIG);
  db = getDatabase(app);
  messagesRef = ref(db, 'messages');
  presenceRef = ref(db, `presence/${userId}`);
  typingRef   = ref(db, `typing/${userId}`);

  set(presenceRef, { name: currentUser, online: true, ts: Date.now() });
  onDisconnect(presenceRef).remove();
  onDisconnect(typingRef).remove();

  // Online count
  onValue(ref(db, 'presence'), snap => {
    document.getElementById('online-num').textContent =
      snap.exists() ? Object.keys(snap.val()).length : 0;
  });

  // Typing indicator
  onValue(ref(db, 'typing'), snap => {
    const ta = document.getElementById('typing-area');
    if (!snap.exists()) { ta.textContent = ''; return; }
    const t = T[currentLang];
    const typers = Object.entries(snap.val())
      .filter(([uid, d]) => uid !== userId && d.active && Date.now() - d.ts < 5000)
      .map(([, d]) => d.name);
    if (!typers.length)      ta.textContent = '';
    else if (typers.length === 1) ta.textContent = t.typing1(typers[0]);
    else ta.textContent = t.typingMany(typers.slice(0,-1).join(', '), typers.at(-1));
  });

  // Messages
  onChildAdded(query(messagesRef, limitToLast(200)), snap => {
    if (messageKeys.has(snap.key)) return;
    messageKeys.add(snap.key);
    renderMessage(snap.key, snap.val());
    if (isAtBottom) scrollToBottom();
  });
}

// ══════════════════════════════════════════════
//  SEND
// ══════════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || !currentUser || !db) return;

  input.value = '';
  autoResize(input);
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  setTimeout(() => btn.disabled = false, 600);
  clearTypingStatus();

  try {
    await push(messagesRef, { author: currentUser, uid: userId, text, ts: Date.now() });
  } catch(e) { console.error(e); }
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function renderMessage(key, data) {
  const { author, uid: senderUid, text, ts } = data;
  const isOwn   = senderUid === userId;
  const locale  = T[currentLang].locale;
  const date    = new Date(ts);
  const dateStr = date.toLocaleDateString(locale, { day:'numeric', month:'long' });
  const timeStr = date.toLocaleTimeString(locale, { hour:'2-digit', minute:'2-digit' });

  const container = document.getElementById('messages');
  document.getElementById('empty-state')?.remove();

  if (dateStr !== lastDate) {
    lastDate = dateStr;
    const sep = document.createElement('div');
    sep.className = 'date-sep';
    sep.innerHTML = `<span>${dateStr}</span>`;
    container.appendChild(sep);
  }

  const group = document.createElement('div');
  group.className = `msg-group ${isOwn ? 'own' : 'other'}`;
  group.dataset.key = key;
  group.innerHTML = `
    <div class="msg-author">
      <span class="msg-author-name">${escHtml(author)}</span>
      <span>${timeStr}</span>
    </div>
    <div class="bubble">${escHtml(text).replace(/\n/g,'<br>')}</div>
  `;
  container.appendChild(group);
}

// ══════════════════════════════════════════════
//  NAME
// ══════════════════════════════════════════════
function setName() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) return;
  currentUser = val;
  localStorage.setItem('chat_name', val);
  document.getElementById('username-display').textContent = val;
  document.getElementById('name-modal').classList.add('hidden');
  initFirebase();
  if (presenceRef) set(presenceRef, { name: val, online: true, ts: Date.now() });
}

function changeName() {
  document.getElementById('name-input').value = currentUser;
  document.getElementById('name-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('name-input').focus(), 50);
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function scrollToBottom() {
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

document.getElementById('messages').addEventListener('scroll', function() {
  isAtBottom = this.scrollHeight - this.scrollTop - this.clientHeight < 80;
});

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleTyping() {
  if (!typingRef) return;
  set(typingRef, { name: currentUser, active: true, ts: Date.now() });
  clearTimeout(typingTimer);
  typingTimer = setTimeout(clearTypingStatus, 3000);
}

function clearTypingStatus() {
  if (!typingRef) return;
  set(typingRef, { name: currentUser, active: false, ts: Date.now() });
}

const EMOJIS = ['😂','❤️','🔥','👍','🎉','😎','🤣','😍','🙌','💯','👏','🫡','💀','😭','🤔','✨','🥳','😅','🫶','🤝'];
function toggleEmoji() {
  let tray = document.getElementById('emoji-tray');
  if (tray) { tray.remove(); return; }
  tray = document.createElement('div');
  tray.id = 'emoji-tray';
  Object.assign(tray.style, {
    position:'fixed', bottom:'76px', left:'14px',
    background:'var(--surface)', border:'1px solid var(--border)',
    borderRadius:'14px', padding:'10px', display:'flex',
    flexWrap:'wrap', gap:'6px', maxWidth:'230px', zIndex:'50',
    animation:'msgIn .2s ease'
  });
  EMOJIS.forEach(e => {
    const b = document.createElement('button');
    b.textContent = e;
    Object.assign(b.style, {
      background:'none', border:'none', fontSize:'20px',
      cursor:'pointer', borderRadius:'6px', padding:'2px'
    });
    b.onclick = () => {
      const inp = document.getElementById('msg-input');
      inp.value += e; inp.focus(); tray.remove();
    };
    tray.appendChild(b);
  });
  document.body.appendChild(tray);
  document.addEventListener('click', function rem(ev) {
    if (!tray.contains(ev.target) && ev.target.id !== 'emoji-btn') {
      tray.remove();
      document.removeEventListener('click', rem);
    }
  });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════
//  STARTUP
// ══════════════════════════════════════════════
applyLang(currentLang);

if (currentUser) {
  document.getElementById('username-display').textContent = currentUser;
  document.getElementById('name-modal').classList.add('hidden');
  initFirebase();
} else {
  setTimeout(() => document.getElementById('name-input').focus(), 100);
}

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') setName();
});
</script>
