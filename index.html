<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 Nexa</title>
<link rel="icon" type="image/x-icon" href="img/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════════ */
:root {
  --bg:       #0d0d14;
  --bg2:      #13131e;
  --bg3:      #1a1a2e;
  --panel:    #111120;
  --border:   #252538;
  --accent:   #6c63ff;
  --accent2:  #ff6584;
  --accent3:  #43e97b;
  --text:     #e8e8f4;
  --muted:    #5a5a7a;
  --online:   #43e97b;
  --danger:   #ff4757;
  --warn:     #ffa502;
  --r:        14px;
  --sidebar:  280px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:15px}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
a{color:var(--accent);text-decoration:none}

/* ═══════════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════════ */
.hidden{display:none!important}
.flex{display:flex}
.flex-col{display:flex;flex-direction:column}
.items-center{align-items:center}
.gap-8{gap:8px}
.gap-12{gap:12px}
.f1{flex:1}
.fw700{font-weight:700}
.mono{font-family:'DM Mono',monospace}

/* ═══════════════════════════════════════════════
   PAGES (auth / app)
═══════════════════════════════════════════════ */
#page-auth,#page-app{position:fixed;inset:0;transition:opacity .3s}
#page-auth{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 10%,rgba(108,99,255,.18) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 90%,rgba(255,101,132,.12) 0%,transparent 55%);
  padding:20px;z-index:10;
}
#page-app{display:flex;flex-direction:row}

/* ═══════════════════════════════════════════════
   LANG BAR (on auth page)
═══════════════════════════════════════════════ */
#lang-bar{
  position:absolute;top:16px;right:16px;
  display:flex;gap:4px;background:var(--bg2);
  border:1px solid var(--border);border-radius:22px;padding:4px;
}
.lb{
  background:none;border:none;color:var(--muted);
  font-family:'DM Mono',monospace;font-size:.7rem;
  padding:4px 10px;border-radius:18px;
  display:flex;align-items:center;gap:4px;transition:all .18s;
}
.lb:hover{color:var(--text);background:rgba(255,255,255,.05)}
.lb.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.lb .fl{font-size:14px}
@media(max-width:480px){.lb .ll{display:none}.lb{padding:4px 7px}}

/* ═══════════════════════════════════════════════
   AUTH CARD
═══════════════════════════════════════════════ */
.auth-logo{font-size:52px;margin-bottom:8px}
.auth-title{
  font-size:2.2rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;text-align:center;
}
.auth-sub{color:var(--muted);font-size:.9rem;margin-bottom:32px;text-align:center}

.auth-tabs{
  display:flex;background:var(--bg2);border-radius:12px;padding:4px;gap:4px;
  margin-bottom:24px;width:100%;max-width:380px;
}
.auth-tab{
  flex:1;padding:9px;border:none;border-radius:9px;background:none;
  color:var(--muted);font-size:.9rem;font-weight:600;transition:all .2s;
}
.auth-tab.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}

.auth-card{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  padding:32px 30px;width:100%;max-width:380px;
  animation:fadeUp .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}

.field{margin-bottom:14px}
.field label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:6px;font-weight:500}
.field input{
  width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;
  color:var(--text);font-size:.95rem;padding:11px 14px;outline:none;transition:border-color .2s;
}
.field input:focus{border-color:var(--accent)}
.btn-primary{
  width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:700;
  transition:opacity .2s,transform .15s;margin-top:6px;
}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(1px)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none}

.auth-err{
  background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.3);
  border-radius:8px;padding:10px 14px;font-size:.82rem;color:#ff8b96;margin-bottom:14px;
}

/* ═══════════════════════════════════════════════
   APP LAYOUT
═══════════════════════════════════════════════ */
/* Sidebar */
#sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100%;
}
#sidebar-header{
  padding:14px 14px 10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.s-logo{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:17px;
}
.s-title{font-weight:800;font-size:1rem}
.s-title span{color:var(--muted);font-weight:400}

/* Sidebar lang (top right of header) */
#sb-lang{display:flex;gap:2px;margin-left:auto}
.sbl{
  background:none;border:none;font-size:13px;padding:3px 5px;border-radius:6px;
  color:var(--muted);transition:all .15s;cursor:pointer;
}
.sbl:hover{background:var(--bg3)}
.sbl.on{background:var(--accent);color:#fff;border-radius:6px}

/* Search */
#sidebar-search{padding:10px 12px;border-bottom:1px solid var(--border)}
#search-input{
  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;
  color:var(--text);font-size:.85rem;padding:8px 12px;outline:none;transition:border-color .2s;
}
#search-input:focus{border-color:var(--accent)}

/* Tabs in sidebar */
#sidebar-tabs{
  display:flex;padding:8px 12px;gap:6px;border-bottom:1px solid var(--border);
}
.stab{
  flex:1;padding:6px;border:none;background:none;color:var(--muted);
  font-size:.78rem;font-weight:600;border-radius:8px;transition:all .18s;
}
.stab.on{background:var(--bg3);color:var(--text)}
.stab:hover:not(.on){color:var(--text)}

/* Conversation list */
#conv-list{flex:1;overflow-y:auto;padding:6px 8px}
.conv-item{
  display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:10px;
  cursor:pointer;transition:background .15s;position:relative;
}
.conv-item:hover{background:var(--bg3)}
.conv-item.active{background:rgba(108,99,255,.15);border:1px solid rgba(108,99,255,.2)}
.conv-item .av{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;object-fit:cover;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;position:relative;overflow:hidden;
}
.conv-item .av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.conv-item .av .online-dot{
  position:absolute;bottom:1px;right:1px;width:10px;height:10px;
  background:var(--online);border-radius:50%;border:2px solid var(--panel);
}
.conv-info{flex:1;min-width:0}
.conv-name{font-weight:600;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-preview{color:var(--muted);font-size:.75rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.conv-time{font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace}
.unread-badge{
  background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;
  border-radius:10px;padding:1px 6px;min-width:18px;text-align:center;
}
.new-group-btn{
  margin:8px 12px;padding:9px;background:var(--bg3);border:1px dashed var(--border);
  border-radius:10px;color:var(--muted);font-size:.82rem;font-weight:600;
  text-align:center;cursor:pointer;transition:all .2s;
}
.new-group-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Profile section at bottom */
#profile-bar{
  border-top:1px solid var(--border);padding:10px 12px;
  display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:background .15s;
}
#profile-bar:hover{background:var(--bg3)}
#profile-bar .av{
  width:36px;height:36px;border-radius:50%;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  flex-shrink:0;overflow:hidden;
}
#profile-bar .av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
#pb-name{font-weight:600;font-size:.85rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#pb-status{font-size:.7rem;color:var(--muted)}
.pb-settings-btn{
  background:none;border:none;color:var(--muted);font-size:18px;padding:4px;
  border-radius:6px;transition:color .15s;flex-shrink:0;
}
.pb-settings-btn:hover{color:var(--text)}

/* ═══════════════════════════════════════════════
   MAIN CHAT AREA
═══════════════════════════════════════════════ */
#main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Chat Header */
#chat-header{
  padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
#chat-header .av{
  width:38px;height:38px;border-radius:50%;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:17px;
  flex-shrink:0;overflow:hidden;
}
#chat-header .av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
#ch-name{font-weight:700;font-size:1rem}
#ch-status{font-size:.75rem;color:var(--muted);margin-top:1px}
.ch-actions{margin-left:auto;display:flex;gap:6px}
.ch-btn{
  background:none;border:none;color:var(--muted);font-size:18px;padding:6px;
  border-radius:8px;transition:color .15s;
}
.ch-btn:hover{color:var(--text);background:var(--bg3)}

/* Welcome screen */
#welcome-screen{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:var(--muted);text-align:center;padding:40px;
}
#welcome-screen .big{font-size:64px}
#welcome-screen h2{font-size:1.4rem;color:var(--text);font-weight:700}

/* Messages */
#messages-wrap{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:6px}
.date-sep{
  display:flex;align-items:center;gap:10px;padding:4px 0;
}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}
.date-sep span{font-size:.68rem;font-family:'DM Mono',monospace;color:var(--muted);white-space:nowrap}

.msg-group{display:flex;flex-direction:column;gap:2px;animation:msgIn .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes msgIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
.msg-group.own{align-items:flex-end}
.msg-group.other{align-items:flex-start}
.msg-author-row{
  display:flex;align-items:center;gap:7px;padding:0 12px;
  font-size:.7rem;color:var(--muted);font-family:'DM Mono',monospace;
}
.msg-author-name{color:var(--accent);font-weight:700}
.msg-group.own .msg-author-name{color:var(--accent2)}
.bubble{
  max-width:min(72%,460px);padding:9px 13px;border-radius:16px;
  font-size:.9rem;line-height:1.55;word-break:break-word;position:relative;
}
.msg-group.own .bubble{
  background:linear-gradient(135deg,rgba(108,99,255,.28),rgba(108,99,255,.14));
  border:1px solid rgba(108,99,255,.3);border-bottom-right-radius:4px;
}
.msg-group.other .bubble{
  background:var(--bg3);border:1px solid var(--border);border-bottom-left-radius:4px;
}
/* Admin delete button on hover */
.bubble-wrap{position:relative;display:inline-flex;flex-direction:column;max-width:min(72%,460px)}
.del-msg-btn{
  display:none;position:absolute;top:-8px;right:-8px;
  width:22px;height:22px;border-radius:50%;background:var(--danger);border:none;
  color:#fff;font-size:11px;align-items:center;justify-content:center;z-index:5;
}
.bubble-wrap:hover .del-msg-btn.visible{display:flex}

/* File/image messages */
.msg-img{max-width:220px;border-radius:10px;cursor:pointer;display:block;margin-top:4px}
.msg-file{
  display:flex;align-items:center;gap:9px;padding:8px 12px;
  background:rgba(255,255,255,.05);border-radius:10px;cursor:pointer;margin-top:4px;
}
.msg-file .ficon{font-size:22px}
.msg-file .fname{font-size:.82rem;font-weight:600;color:var(--text)}
.msg-file .fsize{font-size:.7rem;color:var(--muted)}
.msg-video{max-width:260px;border-radius:10px;margin-top:4px}

/* Typing */
#typing-bar{
  height:18px;padding:0 18px;font-size:.7rem;color:var(--muted);
  font-family:'DM Mono',monospace;flex-shrink:0;
}

/* Input */
#input-area{
  padding:10px 14px 14px;background:var(--panel);
  border-top:1px solid var(--border);flex-shrink:0;
}
#input-wrap{
  display:flex;gap:8px;align-items:flex-end;
  background:var(--bg3);border:1.5px solid var(--border);
  border-radius:18px;padding:7px 7px 7px 14px;transition:border-color .2s;
}
#input-wrap:focus-within{border-color:var(--accent)}
#msg-textarea{
  flex:1;background:none;border:none;outline:none;color:var(--text);
  font-family:'Outfit',sans-serif;font-size:.92rem;resize:none;max-height:120px;
  line-height:1.5;padding:4px 0;
}
#msg-textarea::placeholder{color:var(--muted)}
.ia-btn{
  background:none;border:none;color:var(--muted);font-size:20px;padding:5px;
  border-radius:8px;transition:color .15s;flex-shrink:0;
}
.ia-btn:hover{color:var(--text)}
#send-btn{
  width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:50%;color:#fff;font-size:15px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform .15s,opacity .15s;
}
#send-btn:hover{transform:scale(1.08)}
#send-btn:active{transform:scale(.94)}
#send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
#file-input{display:none}

/* ═══════════════════════════════════════════════
   MODALS
═══════════════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(5,5,15,.8);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;
}
.modal-overlay.hidden{display:none}
.modal{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  padding:28px 26px;width:100%;max-width:440px;
  animation:fadeUp .35s cubic-bezier(.34,1.56,.64,1);
  max-height:90vh;overflow-y:auto;
}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.modal-close{
  margin-left:auto;background:none;border:none;color:var(--muted);font-size:20px;
  padding:2px 6px;border-radius:6px;transition:color .15s;
}
.modal-close:hover{color:var(--text)}
.btn-danger{
  background:var(--danger);border:none;border-radius:9px;color:#fff;
  font-size:.9rem;font-weight:700;padding:10px 18px;transition:opacity .2s;
}
.btn-danger:hover{opacity:.85}
.btn-ghost{
  background:var(--bg3);border:1px solid var(--border);border-radius:9px;color:var(--text);
  font-size:.9rem;font-weight:600;padding:10px 18px;transition:all .2s;
}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}

/* Profile Modal */
#modal-profile .avatar-section{
  display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:20px;
}
#profile-avatar-preview{
  width:80px;height:80px;border-radius:50%;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:36px;
  overflow:hidden;cursor:pointer;border:3px solid var(--border);transition:border-color .2s;
  position:relative;
}
#profile-avatar-preview:hover{border-color:var(--accent)}
#profile-avatar-preview img{width:100%;height:100%;object-fit:cover;border-radius:50%}
#avatar-file-input{display:none}
.avatar-hint{font-size:.72rem;color:var(--muted)}

/* Group modal */
.member-list{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-top:8px}
.member-item{
  display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;
  background:var(--bg3);cursor:pointer;transition:background .15s;
}
.member-item:hover{background:var(--bg)}
.member-item input[type=checkbox]{accent-color:var(--accent)}
.member-item .av-sm{
  width:30px;height:30px;border-radius:50%;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  flex-shrink:0;overflow:hidden;
}
.member-item .av-sm img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* Admin panel */
#modal-admin .admin-section{margin-bottom:18px}
#modal-admin .admin-section h3{font-size:.85rem;color:var(--muted);font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.user-row{
  display:flex;align-items:center;gap:10px;padding:9px 10px;
  background:var(--bg3);border-radius:9px;margin-bottom:6px;
}
.user-row .av-sm{width:32px;height:32px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;overflow:hidden}
.user-row .av-sm img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.user-row-name{flex:1;font-size:.85rem;font-weight:600}
.user-row-email{font-size:.72rem;color:var(--muted)}
.badge-admin{background:rgba(108,99,255,.2);color:var(--accent);font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:6px;border:1px solid rgba(108,99,255,.3)}

/* Image lightbox */
#lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;
  display:flex;align-items:center;justify-content:center;cursor:zoom-out;
}
#lightbox.hidden{display:none}
#lightbox img{max-width:92vw;max-height:92vh;border-radius:10px}

/* Toast */
#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:10px 20px;font-size:.85rem;z-index:500;
  transition:opacity .3s,transform .3s;opacity:0;pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* No chat selected */
#no-chat{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.9rem}

/* ═══════════════════════════════════════════════
   MOBILE
═══════════════════════════════════════════════ */
#mobile-back{display:none;background:none;border:none;color:var(--text);font-size:22px;padding:4px}
@media(max-width:680px){
  #sidebar{
    position:fixed;inset:0;z-index:50;width:100%;
    transform:translateX(0);transition:transform .25s;
  }
  #sidebar.hidden-mobile{transform:translateX(-100%)}
  #main{width:100%}
  #mobile-back{display:block}
}
</style>
</head>
<body>

<!-- ══ AUTH PAGE ══ -->
<div id="page-auth">
  <!-- Language bar -->
  <div id="lang-bar">
    <button class="lb on" data-lang="en" onclick="setLang('en')"><span class="fl">🇬🇧</span><span class="ll">EN</span></button>
    <button class="lb" data-lang="ru" onclick="setLang('ru')"><span class="fl">🇷🇺</span><span class="ll">RU</span></button>
    <button class="lb" data-lang="es" onclick="setLang('es')"><span class="fl">🇪🇸</span><span class="ll">ES</span></button>
  </div>

  <div class="auth-logo">💬</div>
  <div class="auth-title" id="auth-title">Welcome</div>
  <div class="auth-sub" id="auth-sub">Sign in or create your account to start chatting</div>

function t(k,...a){ const fn=T[lang][k]; return typeof fn==='function'?fn(...a):fn||k }

function setLang(l){
  lang=l;
  localStorage.setItem('chat_lang',l);
  document.documentElement.lang=l;
  // update all lang buttons
  document.querySelectorAll('[data-lang]').forEach(b=>{
    b.classList.toggle('on', b.dataset.lang===l);
  });
  applyTranslations();
}

function applyTranslations(){
  const l=T[lang];
  // data-i elements
  document.querySelectorAll('[data-i]').forEach(el=>{
    const k=el.dataset.i;
    if(l[k]!==undefined && typeof l[k]==='string') el.textContent=l[k];
  });
  // placeholders
  document.querySelectorAll('[data-i-ph]').forEach(el=>{
    const k=el.dataset.iPh;
    if(l[k]) el.placeholder=l[k];
  });
  // specific
  document.getElementById('auth-title').textContent=l.authTitle;
  document.getElementById('auth-sub').textContent=l.authSub;
  document.getElementById('logo-sfx').textContent=l.logoSfx;
  document.getElementById('wlc-title').textContent=l.wlcTitle;
  document.getElementById('wlc-sub').textContent=l.wlcSub;
  document.getElementById('pb-status').textContent='';
}

function switchTab(tab){
  document.getElementById('form-login').classList.toggle('hidden', tab!=='login');
  document.getElementById('form-register').classList.toggle('hidden', tab!=='register');
  document.getElementById('tab-login').classList.toggle('on', tab==='login');
  document.getElementById('tab-register').classList.toggle('on', tab==='register');
}

async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass =document.getElementById('l-pass').value;
  const errEl=document.getElementById('login-err');
  errEl.classList.add('hidden');

  // Admin shortcut
  if(email===ADMIN_EMAIL && pass===ADMIN_PASS){
    me={uid:ADMIN_UID,email:'admin',name:'Admin',bio:'',avatar:'🛡️',avatarUrl:null,isAdmin:true};
    showApp();return;
  }
  if(!email||!pass){errEl.textContent=t('errFillAll');errEl.classList.remove('hidden');return}
  const btn=document.getElementById('login-btn');
  btn.disabled=true;
  try{
    await signInWithEmailAndPassword(auth,email,pass);
  }catch(e){
    errEl.textContent=t('errBadCreds');
    errEl.classList.remove('hidden');
    btn.disabled=false;
  }
}

async function doRegister(){
  const name =document.getElementById('r-name').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pass =document.getElementById('r-pass').value;
  const errEl=document.getElementById('reg-err');
  errEl.classList.add('hidden');
  if(!name||!email||!pass){errEl.textContent=t('errFillAll');errEl.classList.remove('hidden');return}
  if(pass.length<6){errEl.textContent=t('errWeakPass');errEl.classList.remove('hidden');return}
  const btn=document.getElementById('reg-btn'); btn.disabled=true;
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    const uid=cred.user.uid;
    await set(ref(db,`users/${uid}`),{
      name,email,bio:'',avatar:'😀',avatarUrl:null,
      createdAt:Date.now(),isAdmin:false
    });
  }catch(e){
    if(e.code==='auth/email-already-in-use') errEl.textContent=t('errEmailUse');
    else errEl.textContent=e.message;
    errEl.classList.remove('hidden');
    btn.disabled=false;
  }
}

async function doLogout(){
  closeModal('modal-profile');
  if(presRef) await set(presRef,{online:false,ts:Date.now()});
  if(me?.uid!==ADMIN_UID) await signOut(auth);
  me=null; activeConv=null; msgKeys.clear();
  document.getElementById('page-app').classList.add('hidden');
  document.getElementById('page-auth').style.display='flex';
  document.getElementById('l-email').value='';
  document.getElementById('l-pass').value='';
  document.getElementById('login-btn').disabled=false;
  document.getElementById('reg-btn').disabled=false;
}

onAuthStateChanged(auth, async user=>{
  if(user){
    const snap=await get(ref(db,`users/${user.uid}`));
    const p=snap.val()||{name:user.email,bio:'',avatar:'😀',avatarUrl:null,isAdmin:false};
    me={uid:user.uid,email:user.email,...p,isAdmin:p.isAdmin||false};
    showApp();
  }
});

// ═══════════════════════════════════════════════
//  SHOW APP
// ═══════════════════════════════════════════════
function showApp(){
  document.getElementById('page-auth').style.display='none';
  document.getElementById('page-app').classList.remove('hidden');
  applyTranslations();
  renderProfileBar();
  setupPresence();
  loadUsers();
  loadConvs();
  renderEmojiAvatarGrid();
}

function renderProfileBar(){
  if(!me) return;
  document.getElementById('pb-name').textContent=me.name||(me.isAdmin?'Admin':me.email);
  const avEl=document.getElementById('pb-av');
  avEl.innerHTML='';
  if(me.avatarUrl){
    const img=document.createElement('img');img.src=me.avatarUrl;avEl.appendChild(img);
  } else {
    avEl.textContent=me.avatar||'👤';
  }
  if(me.isAdmin){
    document.getElementById('pb-status').textContent='🛡️ Admin';
  }
}

// ─── Presence ─────────────────────────────────
function setupPresence(){
  if(!me||me.uid===ADMIN_UID) return;
  presRef=ref(db,`presence/${me.uid}`);
  set(presRef,{online:true,name:me.name,ts:Date.now()});
  // Listen to presence of others
  onValue(ref(db,'presence'), snap=>{
    onlineUIDs.clear();
    if(snap.exists()) Object.entries(snap.val()).forEach(([uid,d])=>{ if(d.online) onlineUIDs.add(uid); });
    renderSidebarList();
  });
}

  onValue(ref(db,'users'), snap=>{

  });

function loadConvs(){
  onValue(ref(db,'convs'), snap=>{
    convs={};
    if(snap.exists()) Object.entries(snap.val()).forEach(([id,c])=>{
      // include if member or admin
      if(me.isAdmin || (c.members && c.members[me.uid])){
        convs[id]=c;
      }
    });
    // Also load DMs for me
    onValue(ref(db,'dms'), snap2=>{
      if(snap2.exists()) Object.entries(snap2.val()).forEach(([id,c])=>{
        if(me.isAdmin || id.includes(me.uid)){
          convs['dm_'+id]=c;
        }
      });
      renderSidebarList();
    },{onlyOnce:true});
    renderSidebarList();
  });
  // Also keep DMs live
  onValue(ref(db,'dms'), snap=>{
    if(snap.exists()) Object.entries(snap.val()).forEach(([id,c])=>{
      if(me.isAdmin || id.includes(me.uid)){
        convs['dm_'+id]=c;
      }
    });
    renderSidebarList();
  });
}

function showSideTab(tab){

  ['chats','users','groups'].forEach(t=>{
    document.getElementById(`tab-${t}`).classList.toggle('on',t===tab);
  });
  renderSidebarList();
}

function renderSidebarList(){
  const list=document.getElementById('conv-list');
  const q=document.getElementById('search-input').value.toLowerCase();
  list.innerHTML='';

  if(sideTab==='users'){
    // List all users (except me)
    Object.entries(users).forEach(([uid,p])=>{
      if(uid===me.uid) return;
      if(q && !p.name?.toLowerCase().includes(q) && !p.email?.toLowerCase().includes(q)) return;
      const isOnline=onlineUIDs.has(uid);
      const el=makeConvItem({
        id:'user_'+uid,
        avatar:p.avatarUrl?null:p.avatar||'😀',
        avatarUrl:p.avatarUrl,
        name:p.name||p.email,
        preview:p.bio||p.email,
        online:isOnline,
        time:'',unread:0
      });
      el.onclick=()=>openDM(uid);
      list.appendChild(el);
    });
    return;
  }

  if(sideTab==='groups'){
    Object.entries(convs).forEach(([id,c])=>{
      if(id.startsWith('dm_')) return;
      if(q && !c.name?.toLowerCase().includes(q)) return;
      const el=makeConvItem({
        id,
        avatar:null,avatarUrl:null,
        name:c.name||'Group',
        preview:`${Object.keys(c.members||{}).length} ${t('members')}`,
        online:false,time:'',unread:0
      });
      el.onclick=()=>openConv(id);
      list.appendChild(el);
    });
    return;
  }

  // CHATS tab: DMs + groups I'm in
  const items=[];
  Object.entries(convs).forEach(([id,c])=>{
    let name,avatar,avatarUrl,preview='',isOnline=false,ts=0;
    if(id.startsWith('dm_')){
      const dmId=id.slice(3);
      const otherUid=dmId.split('_').find(u=>u!==me.uid);
      const op=users[otherUid]||{name:'Unknown',avatar:'❓',avatarUrl:null};
      name=op.name||op.email;avatar=op.avatarUrl?null:op.avatar;avatarUrl=op.avatarUrl;
      isOnline=onlineUIDs.has(otherUid);
      const lm=c.lastMsg;
      if(lm){preview=lm.text||(lm.type==='image'?'📷 Photo':lm.type==='video'?'🎥 Video':'📎 File');ts=lm.ts||0}
    } else {
      name=c.name||'Group';avatar=null;avatarUrl=null;
      const lm=c.lastMsg;
      if(lm){preview=`${lm.author}: ${lm.text||'📎'}`;ts=lm.ts||0}
    }
    if(q && !name.toLowerCase().includes(q) && !preview.toLowerCase().includes(q)) return;
    items.push({id,name,avatar,avatarUrl,preview,isOnline,ts,c});
  });
  items.sort((a,b)=>b.ts-a.ts);
  items.forEach(({id,name,avatar,avatarUrl,preview,isOnline})=>{
    const c=convs[id];
    const el=makeConvItem({id,name,avatar,avatarUrl,preview,online:isOnline,time:'',unread:0});
    el.classList.toggle('active',id===activeConv);
    el.onclick=()=>id.startsWith('dm_')?openDMById(id):openConv(id);
    list.appendChild(el);
  });
}

function makeConvItem({id,name,avatar,avatarUrl,preview,online,time,unread}){
  const el=document.createElement('div');
  el.className='conv-item';el.dataset.id=id;
  const avDiv=document.createElement('div');avDiv.className='av';
  if(avatarUrl){const img=document.createElement('img');img.src=avatarUrl;avDiv.appendChild(img);}
  else avDiv.textContent=avatar||'💬';
  if(online){const dot=document.createElement('div');dot.className='online-dot';avDiv.appendChild(dot);}
  const info=document.createElement('div');info.className='conv-info';
  info.innerHTML=`<div class="conv-name">${esc(name)}</div><div class="conv-preview">${esc(preview)}</div>`;
  el.appendChild(avDiv);el.appendChild(info);
  return el;
}

function loadMessages(convId, dbRoot, dbPath){
  const wrap=document.getElementById('messages-wrap');
  wrap.innerHTML='';
  msgKeys.clear();lastDate='';
  // Remove old listener
  if(msgListener){ msgListener(); msgListener=null; }
  // Typing
  setupTypingListener(convId);
  const msgsRef=ref(db,`${dbRoot}/${dbPath}/messages`);
  const q2=query(msgsRef,limitToLast(150));
  msgListener=onChildAdded(q2,snap=>{
    if(msgKeys.has(snap.key))return;
    msgKeys.add(snap.key);
    renderMsg(snap.key,snap.val(),convId,dbRoot,dbPath);
    if(isAtBot) scrollBot();
  });
}

function renderMsg(key,d,convId,dbRoot,dbPath){
  const wrap=document.getElementById('messages-wrap');
  const isOwn=d.uid===me.uid;
  const locale=T[lang].locale;
  const date=new Date(d.ts||Date.now());
  const dateStr=date.toLocaleDateString(locale,{day:'numeric',month:'long'});
  const timeStr=date.toLocaleTimeString(locale,{hour:'2-digit',minute:'2-digit'});

  // Empty state
  document.getElementById('welcome-screen').classList.add('hidden');

  if(dateStr!==lastDate){
    lastDate=dateStr;
    const sep=document.createElement('div');sep.className='date-sep';
    sep.innerHTML=`<span>${dateStr}</span>`;wrap.appendChild(sep);
  }

  const group=document.createElement('div');
  group.className=`msg-group ${isOwn?'own':'other'}`;
  group.dataset.key=key;

  const authorRow=document.createElement('div');
  authorRow.className='msg-author-row';
  authorRow.innerHTML=`<span class="msg-author-name">${esc(d.author||'?')}</span><span>${timeStr}</span>`;
  group.appendChild(authorRow);

  const bwrap=document.createElement('div');
  bwrap.className='bubble-wrap';

  // Delete button (admin)
  if(me.isAdmin){
    const delBtn=document.createElement('button');
    delBtn.className='del-msg-btn visible';delBtn.textContent='✕';
    delBtn.onclick=()=>{
      if(confirm('Delete this message?'))
        remove(ref(db,`${dbRoot}/${dbPath}/messages/${key}`));
    };
    bwrap.appendChild(delBtn);
  }

  const bubble=document.createElement('div');
  bubble.className='bubble';

  if(d.type==='image'){
    if(d.text) bubble.innerHTML=`<div style="margin-bottom:6px">${esc(d.text)}</div>`;
    const img=document.createElement('img');
    img.className='msg-img';img.src=d.url;img.alt='image';
    img.onclick=()=>window.openLightbox(d.url);
    bubble.appendChild(img);
  } else if(d.type==='video'){
    if(d.text) bubble.innerHTML=`<div style="margin-bottom:6px">${esc(d.text)}</div>`;
    const vid=document.createElement('video');
    vid.className='msg-video';vid.src=d.url;vid.controls=true;
    bubble.appendChild(vid);
  } else if(d.type==='file'){
    const fDiv=document.createElement('a');
    fDiv.className='msg-file';fDiv.href=d.url;fDiv.target='_blank';fDiv.rel='noopener';
    fDiv.innerHTML=`<span class="ficon">📎</span><div><div class="fname">${esc(d.fileName||'File')}</div><div class="fsize">${esc(d.fileSize||'')}</div></div>`;
    bubble.appendChild(fDiv);
  } else {
    bubble.innerHTML=esc(d.text||'').replace(/\n/g,'<br>');
  }

  bwrap.appendChild(bubble);
  group.appendChild(bwrap);
  wrap.appendChild(group);
}

async function sendMsg(){
  if(!activeConv||!me)return;
  const ta=document.getElementById('msg-textarea');
  const text=ta.value.trim();
  if(!text)return;
  ta.value='';resizeTA(ta);
  clearTypingStatus();
  await pushMsg({type:'text',text,author:me.name||me.email,uid:me.uid,ts:Date.now()});
}

async function pushMsg(data){
  if(!activeConv)return;
  const {dbRoot,dbPath}=getConvPaths(activeConv);
  const msgsRef=ref(db,`${dbRoot}/${dbPath}/messages`);
  await push(msgsRef,data);
  // Update lastMsg
  const preview=data.text||(data.type==='image'?'📷':data.type==='video'?'🎥':'📎');
  await update(ref(db,`${dbRoot}/${dbPath}`),{
    lastMsg:{text:preview,author:data.author,uid:data.uid,ts:data.ts},
    updatedAt:data.ts
  });
}

function getConvPaths(id){
  if(id.startsWith('dm_')) return {dbRoot:'dms',dbPath:id.slice(3)};
  return {dbRoot:'convs',dbPath:id};
}

function handleMsgKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}
function resizeTA(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}

// ─── Typing ───────────────────────────────────
function handleTyping(){
  if(!activeConv||!me)return;
  const {dbRoot,dbPath}=getConvPaths(activeConv);
  set(ref(db,`${dbRoot}/${dbPath}/typing/${me.uid}`),{name:me.name,active:true,ts:Date.now()});
  clearTimeout(typTimer);
  typTimer=setTimeout(clearTypingStatus,3000);
}
function clearTypingStatus(){
  if(!activeConv||!me)return;
  const {dbRoot,dbPath}=getConvPaths(activeConv);
  set(ref(db,`${dbRoot}/${dbPath}/typing/${me.uid}`),{name:me.name,active:false,ts:Date.now()});
}
function setupTypingListener(convId){
  const {dbRoot,dbPath}=getConvPaths(convId);
  onValue(ref(db,`${dbRoot}/${dbPath}/typing`),snap=>{
    const bar=document.getElementById('typing-bar');
    if(!snap.exists()){bar.textContent='';return;}
    const typers=Object.entries(snap.val())
      .filter(([uid,d])=>uid!==me.uid&&d.active&&Date.now()-d.ts<5000)
      .map(([,d])=>d.name);
    if(!typers.length) bar.textContent='';
    else if(typers.length===1) bar.textContent=t('isTyping',typers[0]);
    else bar.textContent=t('manyTyping',typers.slice(0,-1).join(', '),typers.at(-1));
  });
}

// ─── File upload ──────────────────────────────
async function handleFile(e){
  const file=e.target.files[0];
  if(!file||!activeConv)return;
  e.target.value='';
  const MB=file.size/1024/1024;
  if(MB>10){showToast(t('fileTooBig'));return;}

  const ext=file.name.split('.').pop().toLowerCase();
  const isImg=['jpg','jpeg','png','gif','webp','bmp'].includes(ext);
  const isVid=['mp4','webm','mov','avi'].includes(ext);

  try{
    const path=`uploads/${me.uid}/${Date.now()}_${file.name}`;
    const snap=await uploadBytes(sRef(stor,path),file);
    const url=await getDownloadURL(snap.ref);
    const type=isImg?'image':isVid?'video':'file';
    const fmtSize=MB<1?`${Math.round(file.size/1024)} KB`:`${MB.toFixed(1)} MB`;
    await pushMsg({
      type,url,author:me.name||me.email,uid:me.uid,ts:Date.now(),
      fileName:file.name,fileSize:fmtSize,text:''
    });
  }catch(err){console.error(err);showToast('Upload failed: '+err.message);}
}

      await remove(ref(db,`${id.startsWith('dm_')?'dms':'convs'}/${id.replace(/^dm_/,'')}/messages`));
      showToast('Cleared');row.remove();
    };
    row.appendChild(delBtn);cl.appendChild(row);
  };
  if(dmsSnap.exists()) Object.entries(dmsSnap.val()).forEach(([id,c])=>{
    const parts=id.split('_');
    const n1=users[parts[0]]?.name||parts[0];const n2=users[parts[1]]?.name||parts[1];
    addChatRow('dm_'+id,`${n1} ↔ ${n2}`,Object.keys(c.messages||{}).length);
  });
  if(gSnap.exists()) Object.entries(gSnap.val()).forEach(([id,c])=>{
    addChatRow(id,c.name||'Group',Object.keys(c.messages||{}).length);
  });
  openModal('modal-admin');
}

// ─── Profile bar click: admin or profile ──────
document.getElementById('profile-bar').onclick=()=>{
  if(me?.isAdmin) openAdminPanel();
  else openProfile();
};
// admin panel via settings icon for admin
document.querySelector('#profile-bar .pb-settings-btn').onclick=(e)=>{
  e.stopPropagation();
  if(me?.isAdmin) openAdminPanel();
  else openProfile();
};

// ─── Chat info ────────────────────────────────
function openChatInfo(){
  if(!activeConv)return;
  const c=convs[activeConv];
  document.getElementById('ci-title').textContent=c?.name||t('users');
  const cont=document.getElementById('ci-content');cont.innerHTML='';
  if(activeConv.startsWith('dm_')){
    const otherUid=activeConv.slice(3).split('_').find(u=>u!==me.uid);
    const op=users[otherUid]||{};
    cont.innerHTML=`
      <div style="text-align:center;padding:10px 0 20px">
        <div style="font-size:48px;margin-bottom:8px">${op.avatarUrl?`<img src="${op.avatarUrl}" style="width:60px;height:60px;border-radius:50%;object-fit:cover">`:op.avatar||'😀'}</div>
        <div style="font-weight:700;font-size:1.1rem">${esc(op.name||'?')}</div>
        <div style="color:var(--muted);font-size:.85rem;margin-top:4px">${esc(op.email||'')}</div>
        ${op.bio?`<div style="margin-top:8px;font-size:.85rem;color:var(--muted)">${esc(op.bio)}</div>`:''}
      </div>`;
  } else {
    const members=Object.keys(c?.members||{});
    cont.innerHTML=`<div style="font-size:.8rem;color:var(--muted);margin-bottom:10px">${members.length} ${t('members')}</div>`;
    members.forEach(uid=>{
      const p=users[uid]||{};
      const row=document.createElement('div');row.className='user-row';
      const avDiv=document.createElement('div');avDiv.className='av-sm';
      if(p.avatarUrl){const img=document.createElement('img');img.src=p.avatarUrl;avDiv.appendChild(img);}
      else avDiv.textContent=p.avatar||'😀';
      row.appendChild(avDiv);
      const nm=document.createElement('span');nm.style.fontWeight='600';nm.style.fontSize='.85rem';nm.textContent=p.name||p.email||uid;
      row.appendChild(nm);
      if(onlineUIDs.has(uid)){
        const dot=document.createElement('span');dot.style.cssText='width:8px;height:8px;border-radius:50%;background:var(--online);display:inline-block;margin-left:auto';
        row.appendChild(dot);
      }
      cont.appendChild(row);
    });
  }
  openModal('modal-chatinfo');
}

// ═══════════════════════════════════════════════
//  MODALS
// ═══════════════════════════════════════════════
function openModal(id){document.getElementById(id).classList.remove('hidden')}
function closeModal(id){document.getElementById(id).classList.add('hidden')}
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m)m.classList.add('hidden');});
});

// ═══════════════════════════════════════════════
//  MOBILE
// ═══════════════════════════════════════════════
function mobileBack(){
  activeConv=null;
  document.getElementById('sidebar').classList.remove('hidden-mobile');
  document.getElementById('welcome-screen').classList.remove('hidden');
  document.getElementById('chat-view').classList.add('hidden');
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

// ─── Helpers ──────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─── Init lang ────────────────────────────────
setLang(lang);
</script>
