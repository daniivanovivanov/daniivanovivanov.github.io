<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Quiz de Prefijos y Sufijos</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="bg-white shadow-2xl rounded-2xl p-6 w-full max-w-2xl">
  <h1 class="text-2xl font-bold mb-4 text-center">Quiz de Prefijos y Sufijos</h1>
  
  <div id="nivel" class="text-center mb-4 font-semibold"></div>
  <div id="progreso" class="text-center mb-4 text-sm text-gray-600"></div>
  
  <div id="pregunta" class="text-lg font-medium mb-4"></div>
  
  <div id="opciones" class="grid gap-3"></div>
  
  <div id="inputContainer" class="hidden mt-4">
    <input id="respuestaInput" type="text" class="w-full p-2 border rounded-lg" placeholder="Escribe tu respuesta...">
    <button onclick="verificarRespuestaEscrita()" class="mt-2 w-full bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700">Comprobar</button>
  </div>
  
  <div id="feedback" class="mt-4 font-semibold text-center"></div>
  
  <button id="siguienteBtn" onclick="siguientePregunta()" class="hidden mt-4 w-full bg-green-600 text-white p-2 rounded-lg hover:bg-green-700">Siguiente</button>
</div>

<script>
const datos = [
  {tipo:"prefijo", elemento:"andro-", significado:"varón", ejemplo:"androfobia"},
  {tipo:"prefijo", elemento:"antropo-", significado:"ser humano", ejemplo:"antropología"},
  {tipo:"prefijo", elemento:"biblio-", significado:"libro", ejemplo:"biblioteca"},
  {tipo:"prefijo", elemento:"cefalo-", significado:"cabeza", ejemplo:"cefalópodo"},
  {tipo:"prefijo", elemento:"crono-", significado:"tiempo", ejemplo:"cronología"},
  {tipo:"prefijo", elemento:"demo-", significado:"pueblo", ejemplo:"demografía"},
  {tipo:"prefijo", elemento:"dermat-", significado:"piel", ejemplo:"dermatólogo"},
  {tipo:"prefijo", elemento:"filo-", significado:"amigo", ejemplo:"filología"},
  {tipo:"prefijo", elemento:"geno-", significado:"pueblo", ejemplo:"genocidio"},
  {tipo:"prefijo", elemento:"gineco-", significado:"mujer", ejemplo:"ginecólogo"},
  {tipo:"prefijo", elemento:"hidro-", significado:"agua", ejemplo:"hidromasaje"},
  {tipo:"prefijo", elemento:"piro-", significado:"fuego", ejemplo:"pirómano"},
  {tipo:"prefijo", elemento:"psico-", significado:"mente", ejemplo:"psicología"},
  {tipo:"prefijo", elemento:"rino-", significado:"nariz", ejemplo:"rinitis"},
  {tipo:"prefijo", elemento:"tele-", significado:"distancia", ejemplo:"televisión"},
  {tipo:"prefijo", elemento:"xeno-", significado:"extranjero", ejemplo:"xenofobia"},
  {tipo:"sufijo", elemento:"-algia", significado:"dolor", ejemplo:"lumbalgia"},
  {tipo:"sufijo", elemento:"-cida", significado:"matar", ejemplo:"insecticida"},
  {tipo:"sufijo", elemento:"-cracia", significado:"poder", ejemplo:"democracia"},
  {tipo:"sufijo", elemento:"-filia", significado:"simpatía", ejemplo:"cinefilia"},
  {tipo:"sufijo", elemento:"-fobia", significado:"temor", ejemplo:"fotofobia"},
  {tipo:"sufijo", elemento:"-iatría", significado:"curación", ejemplo:"pediatría"},
  {tipo:"sufijo", elemento:"-itis", significado:"inflamación", ejemplo:"otitis"},
  {tipo:"sufijo", elemento:"-logía", significado:"ciencia", ejemplo:"biología"},
  {tipo:"sufijo", elemento:"-manía", significado:"pasión", ejemplo:"melomanía"},
  {tipo:"sufijo", elemento:"-nauta", significado:"navegante", ejemplo:"cosmonauta"},
  {tipo:"sufijo", elemento:"-patía", significado:"enfermedad", ejemplo:"cardiopatía"},
  {tipo:"sufijo", elemento:"-plastia", significado:"reconstrucción", ejemplo:"osteoplastia"},
  {tipo:"sufijo", elemento:"-sofía", significado:"sabiduría", ejemplo:"filosofía"},
  {tipo:"sufijo", elemento:"-teca", significado:"lugar donde se guarda", ejemplo:"discoteca"},
  {tipo:"sufijo", elemento:"-terapia", significado:"tratamiento", ejemplo:"hidroterapia"},
  {tipo:"sufijo", elemento:"-voro", significado:"que come", ejemplo:"omnívoro"}
];

let preguntas = [...datos].sort(() => Math.random() - 0.5);
let indice = 0;
let nivel = 1;

function mostrarPregunta() {
  document.getElementById("feedback").textContent = "";
  document.getElementById("siguienteBtn").classList.add("hidden");
  document.getElementById("inputContainer").classList.add("hidden");
  document.getElementById("opciones").innerHTML = "";

  if (indice >= preguntas.length) {
    document.getElementById("pregunta").textContent = "¡Has completado todas las palabras! 🎉";
    return;
  }

  document.getElementById("nivel").textContent = nivel === 1 ? "Nivel 1: Elige la opción correcta" : "Nivel 2: Escribe la respuesta";
  document.getElementById("progreso").textContent = `Pregunta ${indice+1} de ${preguntas.length}`;

  const actual = preguntas[indice];
  const preguntarSignificado = Math.random() > 0.5;

  if (nivel === 1) {
    const correcta = preguntarSignificado ? actual.significado : actual.elemento;
    document.getElementById("pregunta").textContent = preguntarSignificado ?
      `¿Cuál es el significado de ${actual.elemento}?` :
      `¿Qué elemento significa "${actual.significado}"?`;

    let opciones = [correcta];
    while (opciones.length < 3) {
      const random = datos[Math.floor(Math.random()*datos.length)];
      const valor = preguntarSignificado ? random.significado : random.elemento;
      if (!opciones.includes(valor)) opciones.push(valor);
    }

    opciones.sort(() => Math.random()-0.5);

    opciones.forEach(op => {
      const btn = document.createElement("button");
      btn.textContent = op;
      btn.className = "p-2 bg-slate-200 rounded-lg hover:bg-slate-300";
      btn.onclick = () => verificarRespuesta(op, correcta, actual.ejemplo);
      document.getElementById("opciones").appendChild(btn);
    });

  } else {
    document.getElementById("pregunta").textContent = Math.random()>0.5 ?
      `Escribe el significado de ${actual.elemento}` :
      `Escribe el elemento que significa "${actual.significado}"`;
    document.getElementById("inputContainer").classList.remove("hidden");
  }
}

function verificarRespuesta(seleccion, correcta, ejemplo) {
  if (seleccion === correcta) {
    document.getElementById("feedback").innerHTML = `✅ Correcto<br>Ejemplo: <strong>${ejemplo}</strong>`;
  } else {
    document.getElementById("feedback").textContent = `❌ Incorrecto. La respuesta correcta es ${correcta}`;
  }
  document.getElementById("siguienteBtn").classList.remove("hidden");
}

function verificarRespuestaEscrita() {
  const actual = preguntas[indice];
  const respuesta = document.getElementById("respuestaInput").value.trim().toLowerCase();
  const correcta1 = actual.significado.toLowerCase();
  const correcta2 = actual.elemento.toLowerCase();

  if (respuesta === correcta1 || respuesta === correcta2) {
    document.getElementById("feedback").innerHTML = `✅ Correcto<br>Ejemplo: <strong>${actual.ejemplo}</strong>`;
  } else {
    document.getElementById("feedback").textContent = `❌ Incorrecto.`;
  }
  document.getElementById("siguienteBtn").classList.remove("hidden");
}

function siguientePregunta() {
  indice++;
  if (indice === Math.floor(preguntas.length/2)) nivel = 2;
  document.getElementById("respuestaInput").value = "";
  mostrarPregunta();
}

mostrarPregunta();
</script>

</body>
</html>
